<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>辦公室狀態</title>

  <style>
    body {
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 10px;
      font-size: 13px;
    }

    .container {
      max-width: 680px;
      margin: auto;
    }

    h1 {
      text-align: center;
      font-size: 20px;
      margin: 8px 0;
    }

    .user-info {
      text-align: center;
      color: #555;
      margin-bottom: 8px;
      font-size: 12px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-bottom: 8px;
    }

    .summary-box {
      background: white;
      border-radius: 10px;
      padding: 8px;
      text-align: center;
      box-shadow: 0 1px 5px rgba(0,0,0,0.08);
    }

    .summary-number {
      font-size: 20px;
      font-weight: bold;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 8px 10px;
      margin-bottom: 6px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.08);
    }

    .card.stale {
      opacity: 0.45;
      background: #eeeeee;
    }

    .row-main {
      display: grid;
      grid-template-columns: 24px 70px 1fr;
      align-items: center;
      gap: 6px;
    }

    .light {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #c62828;
      box-shadow: 0 0 6px #c62828;
    }

    .light.in {
      background: limegreen;
      box-shadow: 0 0 6px limegreen;
    }

    .light.unknown {
      background: #fbc02d;
      box-shadow: 0 0 6px #fbc02d;
    }

    .name {
      font-size: 16px;
      font-weight: bold;
    }

    .status-text {
      font-size: 14px;
      font-weight: bold;
    }

    .detail {
      margin-left: 30px;
      margin-top: 3px;
      color: #555;
      font-size: 12px;
      line-height: 1.4;
    }

    .stale-text {
      color: #999;
      font-weight: bold;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 5px;
      margin-top: 6px;
    }

    button, select {
      border: none;
      border-radius: 8px;
      padding: 6px 4px;
      font-size: 12px;
    }

    button {
      cursor: pointer;
      color: white;
    }

    .btn-in {
      background: #2e7d32;
    }

    .btn-out {
      background: #c62828;
    }

    .btn-unknown {
      background: #f9a825;
      color: #222;
    }

    .out-panel {
      display: none;
      grid-template-columns: 1fr auto;
      gap: 5px;
      margin-top: 6px;
    }

    .out-panel.show {
      display: grid;
    }

    .confirm-out {
      background: #555;
      color: white;
      padding: 6px 10px;
    }

    .readonly {
      color: #999;
      font-size: 12px;
      margin-top: 4px;
      margin-left: 30px;
    }

    @media (max-width: 480px) {
      body {
        padding: 6px;
      }

      .row-main {
        grid-template-columns: 22px 58px 1fr;
      }

      .name {
        font-size: 15px;
      }

      .status-text {
        font-size: 13px;
      }

      .buttons {
        grid-template-columns: repeat(3, 1fr);
      }

      button, select {
        font-size: 11px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>辦公室狀態</h1>
    <div class="user-info" id="userInfo"></div>

    <div class="summary">
      <div class="summary-box">
        <div>在辦公室</div>
        <div class="summary-number" id="countIn">0</div>
      </div>
      <div class="summary-box">
        <div>外出</div>
        <div class="summary-number" id="countOut">0</div>
      </div>
      <div class="summary-box">
        <div>沒看到</div>
        <div class="summary-number" id="countUnknown">0</div>
      </div>
    </div>

    <div id="list"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getDatabase,
      ref,
      onValue,
      set,
      get,
      update
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDXn3-yB4AgZg4C_Zb1uXwf87_PTP-HwSw",
      authDomain: "redgreen-cde5e.firebaseapp.com",
      databaseURL: "https://redgreen-cde5e-default-rtdb.asia-southeast1.firebasedatabase.app/",
      projectId: "redgreen-cde5e",
      storageBucket: "redgreen-cde5e.firebasestorage.app",
      messagingSenderId: "381439158465",
      appId: "1:381439158465:web:e8160b24d2653c75500c40",
      measurementId: "G-FCQXWHGE57"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // 🔑 安全金鑰對照表（請自行更換右側的亂碼金鑰，確保只有管理員知道）
    const USER_KEYS = {
      "joey8899": "Joey",     // 管理員 Joey 的金鑰
      "anli7766": "Anli",     // 管理員/一般人 Anli 的金鑰
      "frank5544": "Frank",   // 管理員 Frank 的金鑰
      "roy1122": "Roy",       // 一般人 Roy 的金鑰（可選，用舊網址亦可登入）
      "jack2233": "Jack",     // 一般人 Jack 的金鑰（可選）
      "jaren3344": "Jaren",   // 管理員 Jaren 的金鑰（可選）
      "jax4455": "Jax",       // 一般人 Jax 的金鑰（可選）
      "chris5566": "Chris"    // 一般人 Chris 的金鑰（可選）
    };

    const people = ["Roy", "Jack", "Jax", "Chris", "Anli", "Jaren"];
    const admins = ["Joey", "Anli", "Frank", "Jaren"];
    const locations = ["請假", "6F_量測", "1F_RF", "大地遊戲"];

    const params = new URLSearchParams(window.location.search);
    const userKey = params.get("key");
    const userParam = params.get("user");

    let currentUser = "Guest";

    // 1. 優先檢查是否有帶金鑰 (key)
    if (userKey && USER_KEYS[userKey]) {
      currentUser = USER_KEYS[userKey];
    } 
    // 2. 若沒帶金鑰，檢查是否有帶 user 參數
    else if (userParam) {
      // 安全檢查：如果 user 參數企圖登入管理員，一律拒絕並設為 Guest
      if (admins.includes(userParam)) {
        console.warn(`拒絕未授權的管理員登入嘗試: ${userParam}`);
        currentUser = "Guest";
      } else if (people.includes(userParam)) {
        // 一般使用者允許直接用 user 參數登入
        currentUser = userParam;
      }
    }

    const isGuest = currentUser === "Guest";
    const isAdmin = admins.includes(currentUser);

    const statusData = {};

    document.getElementById("userInfo").textContent =
      isAdmin
        ? `目前身份：${currentUser}（管理員）`
        : isGuest
          ? "目前身份：Guest（只能查看）"
          : `目前身份：${currentUser}`;

    function canEdit(name) {
      if (isGuest) return false;
      if (isAdmin) return true;
      return currentUser === name;
    }

    function taiwanDateKey() {
      return new Intl.DateTimeFormat("sv-SE", {
        timeZone: "Asia/Taipei",
        year: "numeric",
        month: "2-digit",
        day: "2-digit"
      }).format(new Date());
    }

    function taiwanTimeText(timestamp) {
      if (!timestamp) return "尚未更新";

      return new Intl.DateTimeFormat("zh-TW", {
        timeZone: "Asia/Taipei",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      }).format(new Date(timestamp));
    }

    function isAfterTaiwanEightAM() {
      const hour = Number(
        new Intl.DateTimeFormat("zh-TW", {
          timeZone: "Asia/Taipei",
          hour: "2-digit",
          hour12: false
        }).format(new Date())
      );

      return hour >= 8;
    }

    function isStale(timestamp) {
      if (!timestamp) return true;
      return Date.now() - timestamp > 4 * 60 * 60 * 1000;
    }

    async function dailyResetIfNeeded() {
      if (!isAfterTaiwanEightAM()) return;

      const today = taiwanDateKey();
      const resetRef = ref(db, "system/lastResetDate");
      const snapshot = await get(resetRef);

      if (snapshot.val() === today) return;

      const updates = {};

      people.forEach(name => {
        updates[`officeStatus/${name}`] = {
          inOffice: false,
          statusType: "unknown",
          location: "",
          updatedAt: Date.now(),
          updatedBy: "System"
        };
      });

      updates["system/lastResetDate"] = today;

      await update(ref(db), updates);
    }

    await dailyResetIfNeeded();

    function getStatusRank(data) {
      if (data.statusType === "in" || data.inOffice === true) return 1;
      if (data.statusType === "unknown") return 2;
      return 3;
    }

    function getStatusText(data) {
      if (data.statusType === "in" || data.inOffice === true) return "在辦公室";
      if (data.statusType === "unknown") return "沒看到人";
      return "外出";
    }

    function renderList() {
      const list = document.getElementById("list");

      const sortedPeople = [...people].sort((a, b) => {
        const dataA = statusData[a] || {};
        const dataB = statusData[b] || {};

        const rankA = getStatusRank(dataA);
        const rankB = getStatusRank(dataB);

        if (rankA !== rankB) return rankA - rankB;
        return a.localeCompare(b);
      });

      let countIn = 0;
      let countOut = 0;
      let countUnknown = 0;

      sortedPeople.forEach(name => {
        const data = statusData[name] || {};

        if (data.statusType === "in" || data.inOffice === true) {
          countIn++;
        } else if (data.statusType === "unknown") {
          countUnknown++;
        } else {
          countOut++;
        }
      });

      document.getElementById("countIn").textContent = countIn;
      document.getElementById("countOut").textContent = countOut;
      document.getElementById("countUnknown").textContent = countUnknown;

      list.innerHTML = "";

      sortedPeople.forEach(name => {
        const data = statusData[name] || {};
        const editable = canEdit(name);
        const statusType = data.statusType || (data.inOffice ? "in" : "out");
        const stale = isStale(data.updatedAt);
        const statusText = getStatusText(data);

        let lightClass = "";
        if (statusType === "in") lightClass = "in";
        if (statusType === "unknown") lightClass = "unknown";

        const locationText =
          statusType === "out"
            ? `去向：${data.location || "未填寫"}`
            : "";

        const staleText = stale ? `<span class="stale-text">超過 4 小時未更新</span>` : "";

        const options = locations.map(loc => {
          const selected = data.location === loc ? "selected" : "";
          return `<option value="${loc}" ${selected}>${loc}</option>`;
        }).join("");

        list.innerHTML += `
          <div class="card ${stale ? "stale" : ""}">
            <div class="row-main">
              <div class="light ${lightClass}"></div>
              <div class="name">${name}</div>
              <div class="status-text">${statusText}</div>
            </div>

            <div class="detail">
              ${locationText ? `<div>${locationText}</div>` : ""}
              <div>更新：${taiwanTimeText(data.updatedAt)}　${staleText}</div>
              ${data.updatedBy ? `<div>更新者：${data.updatedBy}</div>` : ""}
            </div>

            ${
              editable
                ? `
                  <div class="buttons">
                    <button class="btn-in" onclick="setInOffice('${name}')">在</button>
                    <button class="btn-out" onclick="toggleOutPanel('${name}')">外出</button>
                    <button class="btn-unknown" onclick="setUnknown('${name}')">沒看到</button>
                  </div>

                  <div class="out-panel" id="outPanel-${name}">
                    <select id="location-${name}">
                      ${options}
                    </select>
                    <button class="confirm-out" onclick="setOutOffice('${name}')">確認</button>
                  </div>
                `
                : `<div class="readonly">只能查看</div>`
            }
          </div>
        `;
      });
    }

    window.toggleOutPanel = function(name) {
      const panel = document.getElementById(`outPanel-${name}`);
      if (!panel) return;
      panel.classList.toggle("show");
    };

    window.setInOffice = async function(name) {
      if (!canEdit(name)) return;

      await set(ref(db, "officeStatus/" + name), {
        inOffice: true,
        statusType: "in",
        location: "",
        updatedAt: Date.now(),
        updatedBy: currentUser
      });
    };

    window.setOutOffice = async function(name) {
      if (!canEdit(name)) return;

      const select = document.getElementById(`location-${name}`);
      const location = select ? select.value : "未填寫";

      await set(ref(db, "officeStatus/" + name), {
        inOffice: false,
        statusType: "out",
        location: location,
        updatedAt: Date.now(),
        updatedBy: currentUser
      });
    };

    window.setUnknown = async function(name) {
      if (!canEdit(name)) return;

      await set(ref(db, "officeStatus/" + name), {
        inOffice: false,
        statusType: "unknown",
        location: "",
        updatedAt: Date.now(),
        updatedBy: currentUser
      });
    };

    people.forEach(name => {
      const personRef = ref(db, "officeStatus/" + name);

      onValue(personRef, snapshot => {
        statusData[name] = snapshot.val() || {};
        renderList();
      });
    });
  </script>
</body>
</html>
