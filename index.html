<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>辦公室狀態確認</title>
  <style>
    body {
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      padding: 40px;
      background: #f5f5f5;
    }

    h1 {
      margin-bottom: 30px;
    }

    .person {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 16px;
    }

    button {
      width: 120px;
      padding: 12px;
      font-size: 18px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: #333;
      color: white;
    }

    .light {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: red;
      box-shadow: 0 0 8px red;
    }

    .light.in-office {
      background: limegreen;
      box-shadow: 0 0 8px limegreen;
    }

    .status {
      font-size: 18px;
    }
  </style>
</head>
<body>

  <h1>目前辦公室狀態</h1>

  <div class="person">
    <button onclick="toggleStatus('roy')">Roy</button>
    <div id="roy-light" class="light"></div>
    <span id="roy-text" class="status">不在辦公室</span>
  </div>

  <div class="person">
    <button onclick="toggleStatus('jack')">Jack</button>
    <div id="jack-light" class="light"></div>
    <span id="jack-text" class="status">不在辦公室</span>
  </div>

  <div class="person">
    <button onclick="toggleStatus('jaren')">Jaren</button>
    <div id="jaren-light" class="light"></div>
    <span id="jaren-text" class="status">不在辦公室</span>
  </div>

  <div class="person">
    <button onclick="toggleStatus('jax')">Jax</button>
    <div id="jax-light" class="light"></div>
    <span id="jax-text" class="status">不在辦公室</span>
  </div>

  <div class="person">
    <button onclick="toggleStatus('chris')">Chris</button>
    <div id="chris-light" class="light"></div>
    <span id="chris-text" class="status">不在辦公室</span>
  </div>

  <script>
    const statusMap = {
      roy: false,
      jack: false,
      jaren: false,
      jax: false,
      chris: false
    };

    function toggleStatus(name) {
      statusMap[name] = !statusMap[name];

      const light = document.getElementById(`${name}-light`);
      const text = document.getElementById(`${name}-text`);

      if (statusMap[name]) {
        light.classList.add("in-office");
        text.textContent = "人在辦公室";
      } else {
        light.classList.remove("in-office");
        text.textContent = "不在辦公室";
      }
    }
  </script>

</body>
</html>
