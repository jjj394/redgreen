<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>辦公室狀態</title>

  <style>
    body {
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 10px;
      font-size: 13px;
    }

    .container {
      max-width: 720px;
      margin: auto;
    }

    h1 {
      text-align: center;
      font-size: 20px;
      margin: 8px 0;
    }

    .user-info {
      text-align: center;
      color: #555;
      margin-bottom: 8px;
      font-size: 12px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-bottom: 8px;
    }

    .summary-box {
      background: white;
      border-radius: 10px;
      padding: 8px;
      text-align: center;
      box-shadow: 0 1px 5px rgba(0,0,0,0.08);
    }

    .summary-number {
      font-size: 20px;
      font-weight: bold;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 8px 10px;
      margin-bottom: 6px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.08);
    }

    .card.stale {
      opacity: 0.45;
      background: #eeeeee;
    }

    .row-main {
      display: grid;
      grid-template-columns: 24px 70px 1fr;
      align-items: center;
      gap: 6px;
    }

    .light {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #c62828;
      box-shadow: 0 0 6px #c62828;
    }

    .light.in {
      background: limegreen;
      box-shadow: 0 0 6px limegreen;
    }

    .light.unknown {
      background: #fbc02d;
      box-shadow: 0 0 6px #fbc02d;
    }

    .light.offwork {
      background: #1976d2;
      box-shadow: 0 0 6px #1976d2;
    }

    .name {
      font-size: 16px;
      font-weight: bold;
    }

    .status-text {
      font-size: 14px;
      font-weight: bold;
    }

    .detail {
      margin-left: 30px;
      margin-top: 3px;
      color: #555;
      font-size: 12px;
      line-height: 1.4;
    }

    .stale-text {
      color: #999;
      font-weight: bold;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
      margin-top: 6px;
    }

    button, select {
      border: none;
      border-radius: 8px;
      padding: 6px 4px;
      font-size: 12px;
    }

    button {
      cursor: pointer;
      color: white;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .btn-in {
      background: #2e7d32;
    }

    .btn-out {
      background: #c62828;
    }

    .btn-unknown {
      background: #f9a825;
      color: #222;
    }

    .btn-offwork {
      background: #1976d2;
    }

    .out-panel {
      display: none;
      grid-template-columns: 1fr auto;
      gap: 5px;
      margin-top: 6px;
    }

    .out-panel.show {
      display: grid;
    }

    .confirm-out {
      background: #555;
      color: white;
      padding: 6px 10px;
    }

    .readonly {
      color: #999;
      font-size: 12px;
      margin-top: 4px;
      margin-left: 30px;
    }

    .log-panel {
      margin-top: 20px;
      background: #fff;
      border-radius: 10px;
      padding: 12px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.08);
      display: none;
    }

    .log-title {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 8px;
      color: #333;
      border-bottom: 1px solid #eee;
      padding-bottom: 5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
    }

    .log-actions {
      display: flex;
      gap: 5px;
    }

    .clear-log-btn {
      background: #c62828;
      color: white;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 11px;
    }

    .device-btn {
      background: #455a64;
      color: white;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 11px;
    }

    .log-list {
      max-height: 280px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 11px;
      color: #666;
      line-height: 1.6;
    }

    .log-item {
      border-bottom: 1px dashed #f0f0f0;
      padding: 5px 0;
    }

    .log-meta {
      color: #999;
      font-size: 10px;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 16px;
    }

    .modal-backdrop.show {
      display: flex;
    }

    .modal {
      width: 100%;
      max-width: 360px;
      background: white;
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.25);
    }

    .modal-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .modal-content {
      color: #333;
      line-height: 1.7;
      margin-bottom: 16px;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .modal-cancel {
      background: #777;
      color: white;
    }

    .modal-confirm {
      background: #1565c0;
      color: white;
    }

    .modal-danger {
      background: #c62828;
      color: white;
    }

    @media (max-width: 480px) {
      body {
        padding: 6px;
      }

      .row-main {
        grid-template-columns: 22px 58px 1fr;
      }

      .name {
        font-size: 15px;
      }

      .status-text {
        font-size: 13px;
      }

      button, select {
        font-size: 11px;
      }

      .summary {
        grid-template-columns: repeat(4, 1fr);
        gap: 4px;
      }

      .summary-box {
        padding: 6px 2px;
        font-size: 11px;
      }

      .summary-number {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>辦公室狀態</h1>
    <div class="user-info" id="userInfo"></div>

    <div class="summary">
      <div class="summary-box">
        <div>在辦公室</div>
        <div class="summary-number" id="countIn">0</div>
      </div>
      <div class="summary-box">
        <div>外出</div>
        <div class="summary-number" id="countOut">0</div>
      </div>
      <div class="summary-box">
        <div>沒看到</div>
        <div class="summary-number" id="countUnknown">0</div>
      </div>
      <div class="summary-box">
        <div>下班</div>
        <div class="summary-number" id="countOffwork">0</div>
      </div>
    </div>

    <div id="list"></div>

    <div class="log-panel" id="logPanel">
      <div class="log-title">
        <span>📋 近期動作紀錄</span>
        <div class="log-actions">
          <button class="device-btn" id="renameDeviceBtn">裝置名稱</button>
          <button class="clear-log-btn" id="clearLogsBtn">清除 Log</button>
        </div>
      </div>
      <div class="log-list" id="logList">載入紀錄中...</div>
    </div>
  </div>

  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <div class="modal-title" id="modalTitle">確認操作</div>
      <div class="modal-content" id="modalContent"></div>
      <div class="modal-actions">
        <button class="modal-cancel" id="modalCancelBtn">取消</button>
        <button class="modal-confirm" id="modalConfirmBtn">確認</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getDatabase,
      ref,
      onValue,
      set,
      get,
      push,
      update
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDXn3-yB4AgZg4C_Zb1uXwf87_PTP-HwSw",
      authDomain: "redgreen-cde5e.firebaseapp.com",
      databaseURL: "https://redgreen-cde5e-default-rtdb.asia-southeast1.firebasedatabase.app/",
      projectId: "redgreen-cde5e",
      storageBucket: "redgreen-cde5e.firebasestorage.app",
      messagingSenderId: "381439158465",
      appId: "1:381439158465:web:e8160b24d2653c75500c40",
      measurementId: "G-FCQXWHGE57"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const USER_KEYS = {
      "joey8899": "Joey",
      "anli7766": "Anli",
      "frank5544": "Frank",
      "roy1122": "Roy",
      "jack2233": "Jack",
      "jaren3344": "Jaren",
      "jax4455": "Jax",
      "chris5566": "Chris"
    };

    const people = ["Roy", "Jack", "Jax", "Chris", "Anli", "Jaren"];
    const admins = ["Joey", "Anli", "Frank", "Jaren"];
    const locations = ["請假", "6F_量測", "1F_RF", "大地遊戲"];
    const MAX_LOG_COUNT = 300;
    const ACTION_TOKEN_TTL_MS = 10000;

    const params = new URLSearchParams(window.location.search);
    const userKey = params.get("key");
    const userParam = params.get("user");

    let currentUser = "Guest";

    if (userKey && USER_KEYS[userKey]) {
      currentUser = USER_KEYS[userKey];
    } else if (userParam) {
      if (admins.includes(userParam)) {
        currentUser = "Guest";
      } else if (people.includes(userParam)) {
        currentUser = userParam;
      }
    }

    const isGuest = currentUser === "Guest";
    const isAdmin = admins.includes(currentUser);

    const statusData = {};
    let isWriting = false;
    let isCleaningLogs = false;
    let pendingAction = null;

    function makeId(prefix) {
      return prefix + "-" + Math.random().toString(36).slice(2, 10) + "-" + Date.now().toString(36);
    }

    function getDeviceId() {
      let id = localStorage.getItem("officeStatusDeviceId");
      if (!id) {
        id = makeId("device");
        localStorage.setItem("officeStatusDeviceId", id);
      }
      return id;
    }

    function getDeviceName() {
      let name = localStorage.getItem("officeStatusDeviceName");

      if (!name) {
        const input = prompt("請輸入這台裝置名稱，例如 Joey-PC、Anli-iPhone、會議室平板");
        name = input && input.trim() ? input.trim() : "未命名裝置";
        localStorage.setItem("officeStatusDeviceName", name);
      }

      return name;
    }

    const deviceId = getDeviceId();
    let deviceName = getDeviceName();
    const sessionId = makeId("session");

    function getClientInfo(extra = {}) {
      return {
        deviceName,
        deviceId,
        sessionId,
        ...extra
      };
    }

    function refreshUserInfo() {
      document.getElementById("userInfo").textContent =
        isAdmin
          ? `目前身份：${currentUser}（管理員）｜裝置：${deviceName}`
          : isGuest
            ? `Currently viewing as Guest (Read-only)｜裝置：${deviceName}`
            : `目前身份：${currentUser}｜裝置：${deviceName}`;
    }

    refreshUserInfo();

    if (isAdmin) {
      document.getElementById("logPanel").style.display = "block";
    }

    function canEdit(name) {
      if (isGuest) return false;
      if (isAdmin) return true;
      return currentUser === name;
    }

    function taiwanDateKey() {
      return new Intl.DateTimeFormat("sv-SE", {
        timeZone: "Asia/Taipei",
        year: "numeric",
        month: "2-digit",
        day: "2-digit"
      }).format(new Date());
    }

    function taiwanTimeText(timestamp) {
      if (!timestamp) return "尚未更新";

      return new Intl.DateTimeFormat("zh-TW", {
        timeZone: "Asia/Taipei",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      }).format(new Date(timestamp));
    }

    function isAfterTaiwanEightAM() {
      const hour = Number(
        new Intl.DateTimeFormat("zh-TW", {
          timeZone: "Asia/Taipei",
          hour: "2-digit",
          hour12: false
        }).format(new Date())
      );

      return hour >= 8;
    }

    function isStale(timestamp) {
      if (!timestamp) return true;
      return Date.now() - timestamp > 4 * 60 * 60 * 1000;
    }

    async function cleanupLogs() {
      if (isCleaningLogs) return;

      try {
        isCleaningLogs = true;

        const snapshot = await get(ref(db, "logs"));
        if (!snapshot.exists()) return;

        const entries = Object.entries(snapshot.val());
        if (entries.length <= MAX_LOG_COUNT) return;

        entries.sort((a, b) => (a[1].timestamp || 0) - (b[1].timestamp || 0));

        const updates = {};
        const removeCount = entries.length - MAX_LOG_COUNT;

        for (let i = 0; i < removeCount; i++) {
          updates["logs/" + entries[i][0]] = null;
        }

        await update(ref(db), updates);
      } catch (e) {
        console.error("清理 Log 失敗：", e);
      } finally {
        isCleaningLogs = false;
      }
    }

    async function writeLog(targetName, action, detail = "", operatorOverride = null, skipCleanup = false, token = "") {
      try {
        await push(ref(db, "logs"), {
          operator: operatorOverride || currentUser,
          target: targetName,
          action,
          detail,
          timestamp: Date.now(),
          client: getClientInfo({
            actionToken: token || ""
          })
        });

        if (!skipCleanup) {
          await cleanupLogs();
        }
      } catch (e) {
        console.error("寫入日誌失敗：", e);
      }
    }

    async function dailyResetIfNeeded() {
      try {
        if (!isAfterTaiwanEightAM()) return;

        const today = taiwanDateKey();
        const snapshot = await get(ref(db, "system/lastResetDate"));

        if (snapshot.val() === today) return;

        const now = Date.now();
        const updates = {};

        people.forEach(name => {
          updates[`officeStatus/${name}`] = {
            inOffice: false,
            statusType: "unknown",
            location: "",
            updatedAt: now,
            updatedBy: "System",
            client: {
              reason: "dailyReset",
              deviceName,
              deviceId,
              sessionId
            }
          };
        });

        updates["system/lastResetDate"] = today;

        await update(ref(db), updates);
        await writeLog("All", "每日重置", "系統自動重置所有人員狀態為沒看到", "System");
      } catch (e) {
        console.error("每日重置失敗：", e);
      }
    }

    dailyResetIfNeeded();

    function getStatusRank(data) {
      if (data.statusType === "in" || data.inOffice === true) return 1;
      if (data.statusType === "unknown") return 2;
      if (data.statusType === "out") return 3;
      if (data.statusType === "offwork") return 4;
      return 5;
    }

    function getStatusText(data) {
      if (data.statusType === "in" || data.inOffice === true) return "在辦公室";
      if (data.statusType === "unknown") return "沒看到人";
      if (data.statusType === "offwork") return "已下班";
      return "外出";
    }

    function setButtonsDisabled(disabled) {
      document.querySelectorAll("button").forEach(btn => {
        if (
          !btn.classList.contains("clear-log-btn") &&
          !btn.classList.contains("device-btn") &&
          !btn.classList.contains("modal-cancel") &&
          !btn.classList.contains("modal-confirm") &&
          !btn.classList.contains("modal-danger")
        ) {
          btn.disabled = disabled;
        }
      });
    }

    function renderList() {
      const list = document.getElementById("list");
      if (!list) return;

      const sortedPeople = [...people].sort((a, b) => {
        const dataA = statusData[a] || {};
        const dataB = statusData[b] || {};
        const rankA = getStatusRank(dataA);
        const rankB = getStatusRank(dataB);

        if (rankA !== rankB) return rankA - rankB;
        return a.localeCompare(b);
      });

      let countIn = 0;
      let countOut = 0;
      let countUnknown = 0;
      let countOffwork = 0;

      sortedPeople.forEach(name => {
        const data = statusData[name] || {};

        if (data.statusType === "in" || data.inOffice === true) countIn++;
        else if (data.statusType === "unknown") countUnknown++;
        else if (data.statusType === "offwork") countOffwork++;
        else countOut++;
      });

      document.getElementById("countIn").textContent = countIn;
      document.getElementById("countOut").textContent = countOut;
      document.getElementById("countUnknown").textContent = countUnknown;
      document.getElementById("countOffwork").textContent = countOffwork;

      list.innerHTML = "";

      sortedPeople.forEach(name => {
        const data = statusData[name] || {};
        const editable = canEdit(name);
        const statusType = data.statusType || (data.inOffice ? "in" : "out");
        const stale = isStale(data.updatedAt);
        const statusText = getStatusText(data);

        let lightClass = "";
        if (statusType === "in") lightClass = "in";
        else if (statusType === "unknown") lightClass = "unknown";
        else if (statusType === "offwork") lightClass = "offwork";

        const locationText =
          statusType === "out"
            ? `去向：${data.location || "未填寫"}`
            : "";

        const staleText = stale ? `<span class="stale-text">超過 4 小時未更新</span>` : "";

        const options = locations.map(loc => {
          const selected = data.location === loc ? "selected" : "";
          return `<option value="${loc}" ${selected}>${loc}</option>`;
        }).join("");

        list.innerHTML += `
          <div class="card ${stale ? "stale" : ""}" data-person="${name}">
            <div class="row-main">
              <div class="light ${lightClass}"></div>
              <div class="name">${name}</div>
              <div class="status-text">${statusText}</div>
            </div>

            <div class="detail">
              ${locationText ? `<div>${locationText}</div>` : ""}
              <div>更新：${taiwanTimeText(data.updatedAt)}　${staleText}</div>
              ${data.updatedBy ? `<div>更新者：${data.updatedBy}</div>` : ""}
            </div>

            ${
              editable
                ? `
                  <div class="buttons">
                    <button class="btn-in" data-action="in" data-name="${name}">在</button>
                    <button class="btn-out" data-action="toggle-out" data-name="${name}">外出</button>
                    <button class="btn-unknown" data-action="unknown" data-name="${name}">沒看到</button>
                    <button class="btn-offwork" data-action="offwork" data-name="${name}">下班</button>
                  </div>

                  <div class="out-panel" id="outPanel-${name}">
                    <select id="location-${name}">
                      ${options}
                    </select>
                    <button class="confirm-out" data-action="out-confirm" data-name="${name}">確認</button>
                  </div>
                `
                : `<div class="readonly">只能查看</div>`
            }
          </div>
        `;
      });
    }

    function openModal(title, content, confirmText = "確認", danger = false) {
      document.getElementById("modalTitle").textContent = title;
      document.getElementById("modalContent").innerHTML = content;

      const confirmBtn = document.getElementById("modalConfirmBtn");
      confirmBtn.textContent = confirmText;
      confirmBtn.className = danger ? "modal-danger" : "modal-confirm";

      document.getElementById("modalBackdrop").classList.add("show");
    }

    function closeModal() {
      document.getElementById("modalBackdrop").classList.remove("show");
      pendingAction = null;
    }

    function createPendingAction(type, name, location = "") {
      if (!canEdit(name)) return;
      if (isWriting) return;

      const token = makeId("action");
      const createdAt = Date.now();

      pendingAction = {
        token,
        type,
        name,
        location,
        createdAt,
        expiresAt: createdAt + ACTION_TOKEN_TTL_MS
      };

      let statusText = "";
      let detail = "";

      if (type === "in") {
        statusText = "在辦公室";
      } else if (type === "unknown") {
        statusText = "沒看到人";
      } else if (type === "out") {
        statusText = "外出";
        detail = `<div>去向：<strong>${location}</strong></div>`;
      } else if (type === "offwork") {
        statusText = "已下班";
      }

      openModal(
        "確認修改狀態",
        `
          <div>修改人：<strong>${currentUser}</strong></div>
          <div>修改對象：<strong>${name}</strong></div>
          <div>新狀態：<strong>${statusText}</strong></div>
          ${detail}
          <div style="margin-top:8px;color:#777;font-size:12px;">
            此確認在 10 秒後失效。
          </div>
        `,
        "確認修改",
        false
      );
    }

    function validatePendingAction() {
      if (!pendingAction) return false;
      if (!pendingAction.token) return false;
      if (Date.now() > pendingAction.expiresAt) return false;
      if (!canEdit(pendingAction.name)) return false;

      if (!["in", "out", "unknown", "offwork", "clearLogs"].includes(pendingAction.type)) {
        return false;
      }

      return true;
    }

    async function executePendingAction() {
      if (!validatePendingAction()) {
        closeModal();
        alert("操作已失效，請重新點選。");
        return;
      }

      const action = { ...pendingAction };
      closeModal();

      if (action.type === "clearLogs") {
        await executeClearLogs(action.token);
        return;
      }

      await commitStatusChange(action);
    }

    async function commitStatusChange(action) {
      if (isWriting) return;

      isWriting = true;
      setButtonsDisabled(true);

      try {
        const now = Date.now();
        let payload = null;
        let logAction = "";
        let logDetail = "";

        if (action.type === "in") {
          payload = {
            inOffice: true,
            statusType: "in",
            location: "",
            updatedAt: now,
            updatedBy: currentUser,
            client: getClientInfo({
              actionToken: action.token,
              actionType: action.type
            })
          };
          logAction = "設為在辦公室";
        }

        if (action.type === "out") {
          payload = {
            inOffice: false,
            statusType: "out",
            location: action.location,
            updatedAt: now,
            updatedBy: currentUser,
            client: getClientInfo({
              actionToken: action.token,
              actionType: action.type
            })
          };
          logAction = "設為外出";
          logDetail = `去向：${action.location}`;
        }

        if (action.type === "unknown") {
          payload = {
            inOffice: false,
            statusType: "unknown",
            location: "",
            updatedAt: now,
            updatedBy: currentUser,
            client: getClientInfo({
              actionToken: action.token,
              actionType: action.type
            })
          };
          logAction = "設為沒看到";
        }

        if (action.type === "offwork") {
          payload = {
            inOffice: false,
            statusType: "offwork",
            location: "",
            updatedAt: now,
            updatedBy: currentUser,
            client: getClientInfo({
              actionToken: action.token,
              actionType: action.type
            })
          };
          logAction = "設為下班";
        }

        if (!payload) return;

        await set(ref(db, "officeStatus/" + action.name), payload);
        await writeLog(action.name, logAction, logDetail, null, false, action.token);
      } catch (e) {
        console.error("狀態寫入失敗：", e);
        alert("狀態寫入失敗，請稍後再試。");
      } finally {
        isWriting = false;
        setButtonsDisabled(false);
      }
    }

    async function executeClearLogs(token) {
      if (!isAdmin) return;

      try {
        await set(ref(db, "logs"), null);
        await writeLog("logs", "清除 Log", "管理員清除所有歷史紀錄", currentUser, true, token);
        alert("Log 已清除");
      } catch (e) {
        console.error("清除 Log 失敗：", e);
        alert("清除 Log 失敗");
      }
    }

    document.getElementById("list").addEventListener("click", event => {
      const button = event.target.closest("button");
      if (!button) return;

      const action = button.dataset.action;
      const name = button.dataset.name;

      if (!action || !name) return;
      if (!canEdit(name)) return;
      if (isWriting) return;

      if (action === "toggle-out") {
        const panel = document.getElementById(`outPanel-${name}`);
        if (panel) panel.classList.toggle("show");
        return;
      }

      if (action === "in") {
        createPendingAction("in", name);
        return;
      }

      if (action === "unknown") {
        createPendingAction("unknown", name);
        return;
      }

      if (action === "offwork") {
        createPendingAction("offwork", name);
        return;
      }

      if (action === "out-confirm") {
        const select = document.getElementById(`location-${name}`);
        const location = select ? select.value : "未填寫";
        createPendingAction("out", name, location);
      }
    });

    document.getElementById("modalCancelBtn").addEventListener("click", closeModal);
    document.getElementById("modalConfirmBtn").addEventListener("click", executePendingAction);

    document.getElementById("modalBackdrop").addEventListener("click", event => {
      if (event.target.id === "modalBackdrop") {
        closeModal();
      }
    });

    document.getElementById("clearLogsBtn").addEventListener("click", () => {
      if (!isAdmin) return;

      const token = makeId("action");
      const createdAt = Date.now();

      pendingAction = {
        token,
        type: "clearLogs",
        name: "logs",
        createdAt,
        expiresAt: createdAt + ACTION_TOKEN_TTL_MS
      };

      openModal(
        "確認清除 Log",
        `
          <div>此動作會刪除所有歷史紀錄。</div>
          <div style="color:#c62828;font-weight:bold;margin-top:8px;">此動作無法復原。</div>
        `,
        "確認清除",
        true
      );
    });

    document.getElementById("renameDeviceBtn").addEventListener("click", () => {
      const input = prompt("請輸入新的裝置名稱", deviceName);
      if (!input || !input.trim()) return;

      deviceName = input.trim();
      localStorage.setItem("officeStatusDeviceName", deviceName);
      refreshUserInfo();
      alert("裝置名稱已更新");
    });

    people.forEach(name => {
      onValue(ref(db, "officeStatus/" + name), snapshot => {
        statusData[name] = snapshot.val() || {};
        renderList();
      }, error => {
        console.error("讀取 officeStatus 失敗：", error);
      });
    });

    if (isAdmin) {
      onValue(ref(db, "logs"), snapshot => {
        const logListDiv = document.getElementById("logList");
        if (!logListDiv) return;

        const data = snapshot.val();

        if (!data) {
          logListDiv.innerHTML = "尚無任何動作紀錄。";
          return;
        }

        const sortedLogs = Object.values(data).sort((a, b) => {
          return (b.timestamp || 0) - (a.timestamp || 0);
        });

        const recentLogs = sortedLogs.slice(0, 60);

        logListDiv.innerHTML = recentLogs.map(log => {
          const time = taiwanTimeText(log.timestamp);
          const detailText = log.detail ? ` (${log.detail})` : "";
          const client = log.client || {};

          return `
            <div class="log-item">
              <div>
                [${time}]
                <strong>${log.operator || "未知"}</strong>
                將
                <strong>${log.target || "未知"}</strong>
                ${log.action || "更新"}${detailText}
              </div>
              <div class="log-meta">裝置：${client.deviceName || "無"}</div>
              <div class="log-meta">Device ID：${client.deviceId || "無"}</div>
              <div class="log-meta">Session ID：${client.sessionId || "無"}</div>
              <div class="log-meta">Action Token：${client.actionToken || "無"}</div>
            </div>
          `;
        }).join("");
      }, error => {
        console.error("讀取 logs 失敗：", error);
      });
    }
  </script>
</body>
</html>
