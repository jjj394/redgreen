<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>辦公室狀態</title>
  <style>
    body {
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      background: #f5f5f5;
      padding: 40px;
    }
    .card {
      background: white;
      padding: 24px;
      border-radius: 12px;
      max-width: 420px;
      box-shadow: 0 2px 10px #ccc;
    }
    .person {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 16px 0;
      font-size: 22px;
    }
    .left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .light {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: red;
      box-shadow: 0 0 8px red;
    }
    .light.on {
      background: limegreen;
      box-shadow: 0 0 8px limegreen;
    }
    button {
      padding: 8px 16px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: #333;
      color: white;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>辦公室狀態</h1>
    <div id="list"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDXn3-yB4AgZg4C_Zb1uXwf87_PTP-HwSw",
      authDomain: "redgreen-cde5e.firebaseapp.com",
      databaseURL: "https://redgreen-cde5e-default-rtdb.asia-southeast1.firebasedatabase.app/",
      projectId: "redgreen-cde5e",
      storageBucket: "redgreen-cde5e.firebasestorage.app",
      messagingSenderId: "381439158465",
      appId: "1:381439158465:web:e8160b24d2653c75500c40",
      measurementId: "G-FCQXWHGE57"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const people = ["Roy", "Jack", "Jaren", "Jax", "Chris"];
    const list = document.getElementById("list");

    people.forEach(name => {
      list.innerHTML += `
        <div class="person">
          <div class="left">
            <div id="${name}-light" class="light"></div>
            <span>${name}</span>
          </div>
          <button onclick="toggleStatus('${name}')">切換</button>
        </div>
      `;
    });

    window.toggleStatus = async function(name) {
      const personRef = ref(db, "officeStatus/" + name);
      const snapshot = await get(personRef);
      const current = snapshot.val() === true;
      await set(personRef, !current);
    };

    people.forEach(name => {
      const personRef = ref(db, "officeStatus/" + name);
      onValue(personRef, snapshot => {
        const isInOffice = snapshot.val() === true;
        const light = document.getElementById(name + "-light");

        if (isInOffice) {
          light.classList.add("on");
        } else {
          light.classList.remove("on");
        }
      });
    });
  </script>

</body>
</html>
